# Combinata Trail dei Maghe + Trail de le Longane
combinata:
  title: "Combinata Trail de le Longane + Trail dei Maghe"
  desc: |
    Due gare, un'unica sfida: nasce dalla collaborazione tra il **Trail de le Longane** di Lozzo di Cadore e il **Trail dei Maghe** di Lorenzago.

    Nel 2026 torna la promo combinata pensata per chi vuole vivere il meglio del trail in Cadore: **quota agevolata**, **gadget esclusivo** e **classifica dedicata** con la somma dei tempi delle due prove.

    Saranno premiati i **primi 3 uomini** e le **prime 3 donne** con il miglior tempo complessivo.

    Nel 2025 hanno conquistato la combinata **Dylan De Michiel** e **Cecilia De Filippo**.

    [Guarda le classifiche 2025 della combinata →](https://drive.google.com/file/d/1qHxeo6LwNREzvNedgBxS6qf_WT9b_6Mg/view?usp=sharing)

    Questa iniziativa nasce per valorizzare due territori vicini e far scoprire a sempre piu runner le bellezze di Lozzo e Lorenzago.

    **Novita 2026:** arriva anche la **combinata non competitiva**.
  button:
    enable: true
    text: "Iscrizioni 2026 combinata"
    url: "https://www.avaibooksports.com/inscripcion/trail-de-le-longane/"